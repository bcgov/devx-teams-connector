name: CI and GHCR Publish

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io

jobs:
  validate:
    name: Build, run, test, and scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: vars
        run: echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build app
        run: npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for validation
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          no-cache: true
          tags: ${{ steps.vars.outputs.image }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: |
          docker run -d \
            --name teams-connector-ci \
            --publish 3000:3000 \
            --health-cmd='node -e "fetch(\"http://localhost:3000/api/v1/health\").then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"' \
            --health-interval=10s \
            --health-timeout=5s \
            --health-retries=18 \
            --health-start-period=5s \
            -e PORT=3000 \
            -e CONNECTOR_API_KEY=ci-api-key-that-is-at-least-32-characters-long \
            -e BOT_ID=ci-bot-id \
            -e BOT_SECRET=ci-bot-secret \
            -e BOT_TOKEN_TENANT=botframework.com \
            -e LOG_LEVEL=warn \
            ${{ steps.vars.outputs.image }}:ci-${{ github.sha }}

      - name: Wait for container health
        run: |
          for i in {1..24}; do
            status="$(docker inspect --format='{{.State.Health.Status}}' teams-connector-ci)"
            if [ "$status" = "healthy" ]; then
              echo "Container is healthy."
              exit 0
            fi

            if [ "$status" = "unhealthy" ]; then
              echo "Container became unhealthy."
              docker logs teams-connector-ci
              exit 1
            fi

            echo "Container health: $status (attempt $i/24)"
            sleep 5
          done

          echo "Timed out waiting for healthy container."
          docker logs teams-connector-ci
          exit 1

      - name: Smoke test live container
        run: |
          curl --fail --silent http://localhost:3000/api/v1/health > /tmp/health.json
          node -e "const fs=require('node:fs');const j=JSON.parse(fs.readFileSync('/tmp/health.json','utf8'));if(!['healthy','degraded'].includes(j.status)){throw new Error('Unexpected status: '+j.status)}"

      - name: Run test suite
        run: npm test

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.vars.outputs.image }}:ci-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Show Trivy findings
        if: always()
        run: jq -r '.runs[].results[] | "\(.ruleId) \(.message.text)"' trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always() && github.event_name == 'push' && github.actor != 'dependabot[bot]'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Cleanup container
        if: always()
        run: docker rm -f teams-connector-ci || true

  publish:
    name: Push image to GHCR
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: vars
        run: echo "image=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
