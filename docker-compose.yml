services:
  teams-connector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teams-connector-poc
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
